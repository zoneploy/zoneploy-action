# version: 0.1.0
name: 'Deploy to Zoneploy'
description: 'Build, push and deploy your app to Zoneploy. Supports Docker containers and Docker Compose stacks.'

inputs:
  token:
    description: 'Zoneploy deploy token'
    required: true
  dockerfile:
    description: 'Path to Dockerfile (relative to repo root)'
    required: false
    default: 'Dockerfile'
  compose-file:
    description: 'Path to Docker Compose file (relative to repo root)'
    required: false
    default: ''
  api-url:
    description: 'Zoneploy API URL (override for self-hosted or dev instances)'
    required: false
    default: 'https://api.zoneploy.com'

runs:
  using: composite
  steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    # ── Auto-detect: container or stack ─────────────────────────────────────

    - name: Detect deploy type
      id: detect
      shell: bash
      run: |
        # If the user specified a compose file, use it directly
        if [ -n "${{ inputs.compose-file }}" ]; then
          if [ ! -f "${{ inputs.compose-file }}" ]; then
            echo "::error::Compose file not found: ${{ inputs.compose-file }}"
            exit 1
          fi
          echo "type=stack"                              >> "$GITHUB_OUTPUT"
          echo "compose_file=${{ inputs.compose-file }}" >> "$GITHUB_OUTPUT"
          echo "Detected: Stack → ${{ inputs.compose-file }}"

        # Auto-detect compose
        elif [ -f "docker-compose.yml" ]; then
          echo "type=stack"                      >> "$GITHUB_OUTPUT"
          echo "compose_file=docker-compose.yml" >> "$GITHUB_OUTPUT"
          echo "Detected: Stack → docker-compose.yml"
        elif [ -f "docker-compose.yaml" ]; then
          echo "type=stack"                       >> "$GITHUB_OUTPUT"
          echo "compose_file=docker-compose.yaml" >> "$GITHUB_OUTPUT"
          echo "Detected: Stack → docker-compose.yaml"

        # Dockerfile (custom or default)
        elif [ -f "${{ inputs.dockerfile }}" ]; then
          echo "type=container"                       >> "$GITHUB_OUTPUT"
          echo "dockerfile=${{ inputs.dockerfile }}"  >> "$GITHUB_OUTPUT"
          echo "Detected: Container → ${{ inputs.dockerfile }}"

        else
          echo "::error::No deploy file found. Make sure a Dockerfile or docker-compose.yml exists, or set the 'dockerfile' / 'compose-file' inputs."
          exit 1
        fi

    # ── Get registry credentials from Zoneploy ──────────────────────────────

    - name: Get registry credentials
      id: registry
      shell: bash
      run: |
        BODY_FILE=$(mktemp)
        STDERR_FILE=$(mktemp)

        HTTP_CODE=$(curl -sS -X POST "${{ inputs.api-url }}/api/v1/registry/registry-auth" \
          -H "Authorization: Bearer ${{ inputs.token }}" \
          -H "Content-Type: application/json" \
          -d "{\"type\": \"${{ steps.detect.outputs.type }}\"}" \
          -o "$BODY_FILE" \
          -w "%{http_code}" 2>"$STDERR_FILE")
        CURL_EXIT=$?

        BODY=$(cat "$BODY_FILE")
        CURL_ERROR=$(cat "$STDERR_FILE")

        rm -f "$BODY_FILE" "$STDERR_FILE"

        if [ "$CURL_EXIT" -ne 0 ]; then
          echo "::error::Could not reach Zoneploy API at ${{ inputs.api-url }} (curl exit $CURL_EXIT)."
          if [ -n "$CURL_ERROR" ]; then
            echo "::error::$CURL_ERROR"
          fi

          case "$CURL_EXIT" in
            6)  echo "::error::Likely DNS resolution failure. Check that the api-url host exists and is publicly resolvable." ;;
            7)  echo "::error::Likely connection failure. Check that the host is reachable and the service is listening." ;;
            28) echo "::error::Connection timed out. Check public network access, proxying, and firewall rules." ;;
            35|60) echo "::error::TLS/SSL failure. Check the certificate chain and HTTPS configuration." ;;
          esac

          exit 1
        fi

        if [ "$HTTP_CODE" != "200" ]; then
          if [ "$HTTP_CODE" = "401" ] || [ "$HTTP_CODE" = "403" ]; then
            echo "::error::Unauthorized: invalid or expired deploy token. Check that the token is correct and hasn't been revoked."
          elif [ "$HTTP_CODE" = "404" ]; then
            echo "::error::Deploy token not found. Make sure the token exists in your Zoneploy organization."
          else
            echo "::error::Zoneploy API error (HTTP $HTTP_CODE): $BODY"
          fi
          exit 1
        fi

        REGISTRY=$(echo "$BODY" | jq -r '.registry')
        USERNAME=$(echo "$BODY" | jq -r '.username')
        PASSWORD=$(echo "$BODY" | jq -r '.password')
        NAMESPACE=$(echo "$BODY" | jq -r '.namespace')
        DEPLOY_ID=$(echo "$BODY" | jq -r '.deployId')

        echo "::add-mask::$PASSWORD"

        echo "registry=$REGISTRY"   >> "$GITHUB_OUTPUT"
        echo "username=$USERNAME"   >> "$GITHUB_OUTPUT"
        echo "password=$PASSWORD"   >> "$GITHUB_OUTPUT"
        echo "namespace=$NAMESPACE" >> "$GITHUB_OUTPUT"
        echo "deploy_id=$DEPLOY_ID" >> "$GITHUB_OUTPUT"

    - name: Login to Zoneploy Registry
      uses: docker/login-action@v3
      with:
        registry: ${{ steps.registry.outputs.registry }}
        username: ${{ steps.registry.outputs.username }}
        password: ${{ steps.registry.outputs.password }}

    # ── Container ────────────────────────────────────────────────────────────

    - name: Build & push container image
      if: steps.detect.outputs.type == 'container'
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ${{ steps.detect.outputs.dockerfile }}
        push: true
        tags: ${{ steps.registry.outputs.namespace }}:${{ github.sha }}

    - name: Deploy container
      if: steps.detect.outputs.type == 'container'
      shell: bash
      run: |
        BODY_FILE=$(mktemp)
        STDERR_FILE=$(mktemp)

        HTTP_CODE=$(curl -sS -X POST "${{ inputs.api-url }}/api/v1/deploy" \
          -H "Authorization: Bearer ${{ inputs.token }}" \
          -H "Content-Type: application/json" \
          -d "$(jq -n \
            --arg image "${{ steps.registry.outputs.namespace }}:${{ github.sha }}" \
            '{image: $image}')" \
          -o "$BODY_FILE" \
          -w "%{http_code}" 2>"$STDERR_FILE")
        CURL_EXIT=$?

        BODY=$(cat "$BODY_FILE")
        CURL_ERROR=$(cat "$STDERR_FILE")

        rm -f "$BODY_FILE" "$STDERR_FILE"

        if [ "$CURL_EXIT" -ne 0 ]; then
          echo "::error::Could not reach Zoneploy deploy endpoint at ${{ inputs.api-url }}/api/v1/deploy (curl exit $CURL_EXIT)."
          if [ -n "$CURL_ERROR" ]; then
            echo "::error::$CURL_ERROR"
          fi

          case "$CURL_EXIT" in
            6)  echo "::error::Likely DNS resolution failure. Check that the api-url host exists and is publicly resolvable." ;;
            7)  echo "::error::Likely connection failure. Check that the host is reachable and the service is listening." ;;
            28) echo "::error::Connection timed out. Check public network access, proxying, and firewall rules." ;;
            35|60) echo "::error::TLS/SSL failure. Check the certificate chain and HTTPS configuration." ;;
          esac

          exit 1
        fi

        if [ "$HTTP_CODE" != "202" ]; then
          if [ "$HTTP_CODE" = "401" ] || [ "$HTTP_CODE" = "403" ]; then
            echo "::error::Unauthorized: invalid or expired deploy token."
          elif [ "$HTTP_CODE" = "404" ]; then
            echo "::error::Deploy token not found. Make sure the token exists in your Zoneploy organization."
          else
            echo "::error::Deploy failed (HTTP $HTTP_CODE): $BODY"
          fi
          exit 1
        fi

        echo "Deploy started: $(echo "$BODY" | jq -r '.deployUrl // .message // "ok"')"

    # ── Stack ────────────────────────────────────────────────────────────────

    - name: Build & push stack images
      if: steps.detect.outputs.type == 'stack'
      shell: bash
      run: bash "${{ github.action_path }}/scripts/build-stack.sh"
      env:
        ZP_NAMESPACE: ${{ steps.registry.outputs.namespace }}
        ZP_SHA: ${{ github.sha }}
        ZP_COMPOSE_FILE: ${{ steps.detect.outputs.compose_file }}

    - name: Deploy stack
      if: steps.detect.outputs.type == 'stack'
      shell: bash
      run: bash "${{ github.action_path }}/scripts/deploy-stack.sh"
      env:
        ZP_TOKEN: ${{ inputs.token }}
        ZP_API_URL: ${{ inputs.api-url }}
        ZP_DEPLOY_ID: ${{ steps.registry.outputs.deploy_id }}
        ZP_SHA: ${{ github.sha }}
        ZP_COMPOSE_FILE: ${{ steps.detect.outputs.compose_file }}
